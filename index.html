<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>疲労度チェック rPPG PWA</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#111111">
  <style>
    body { margin:0; font-family: system-ui, sans-serif; background:#111; color:#eee; text-align:center; }
    header { padding:10px 0; background:#181818; font-size:18px; font-weight:bold; }
    main { padding:10px; }
    video { width:260px; max-width:80vw; transform:scaleX(-1); border-radius:8px; margin-top:8px; background:#000; }
    #startBtn { padding:10px 20px; font-size:16px; margin:10px 0; border-radius:6px; border:none; background:#1e88e5; color:#fff; }
    #startBtn:disabled { background:#555; }
    #status { font-size:13px; color:#ccc; min-height:2em; white-space:pre-line; margin-top:6px; }
    #scoreBox { margin-top:10px; padding:10px; border-radius:8px; background:#222; display:inline-block; min-width:220px; text-align:left; }
    .label { color:#aaa; font-size:12px; }
    .value { font-size:22px; font-weight:bold; margin:4px 0; }
    #level { font-size:14px; margin-bottom:6px; }
    #results {
      margin-top: 8px;
      font-size: 13px;
      white-space: pre-line;
      max-height: 180px;
      overflow-y: auto;
      background: #1a1a1a;
      padding: 8px;
      border-radius: 6px;
    }
    #progressBar {
      width: 260px;
      height: 8px;
      background: #333;
      border-radius: 4px;
      margin: 10px auto;
      overflow: hidden;
      display:none;
    }
    #progressFill {
      height: 100%;
      width: 0%;
      background: #1e88e5;
      transition: width 0.2s linear;
    }
    canvas { display:none; }
  </style>
</head>
<body>
<header>疲労度チェック rPPG（iPhone SE3）</header>
<main>
  <p>顔を画面中央に合わせて、30秒じっとしてください。</p>
  <button id="startBtn">測定開始</button><br>

  <div style="position:relative; display:inline-block;">
    <video id="video" autoplay playsinline></video>

    <!-- 顔位置ガイド（半透明の枠） -->
    <div id="guide"
      style="
        position:absolute;
        top:20%;
        left:50%;
        transform:translateX(-50%);
        width:60%;
        height:40%;
        border:2px solid rgba(0,200,255,0.6);
        border-radius:10px;
        pointer-events:none;
      ">
    </div>
  </div>

  <canvas id="canvas" width="240" height="180"></canvas>

  <div id="progressBar"><div id="progressFill"></div></div>

  <div id="status"></div>

  <div id="scoreBox">
    <div class="label">疲労スコア（0〜100）</div>
    <div class="value" id="fatigueScore">--</div>
    <div id="level">疲労レベル：--</div>
    <div id="results"></div>
  </div>
</main>

<script>
  const FPS = 30;
  const DURATION_SEC = 30;

  const video = document.getElementById('video');
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  const startBtn = document.getElementById('startBtn');
  const statusEl = document.getElementById('status');
  const resultsEl = document.getElementById('results');
  const fatigueEl = document.getElementById('fatigueScore');
  const levelEl = document.getElementById('level');
  const progressBar = document.getElementById('progressBar');
  const progressFill = document.getElementById('progressFill');

  let rgbSeries = [];
  let eyeSeries = [];
  let running = false;

  function logStatus(msg) { statusEl.textContent = msg; }
  function logResults(msg) { resultsEl.textContent = msg; }

  async function initCamera() {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: "user", width: 240, height: 180, frameRate: { ideal: FPS } },
      audio: false
    });
    video.srcObject = stream;
    video.muted = true;
    video.setAttribute("playsinline", "");
    await video.play();

    canvas.width = video.videoWidth || 240;
    canvas.height = video.videoHeight || 180;
  }

  function captureFrame() {
    if (!running) return;
    const w = canvas.width;
    const h = canvas.height;
    ctx.drawImage(video, 0, 0, w, h);

    // rPPG ROI（中央 32x32）
    const size = 32;
    const sx = Math.floor(w / 2 - size / 2);
    const sy = Math.floor(h / 2 - size / 2);
    const img = ctx.getImageData(sx, sy, size, size).data;

    let r = 0, g = 0, b = 0, c = 0;
    for (let i = 0; i < img.length; i += 4) {
      r += img[i];
      g += img[i + 1];
      b += img[i + 2];
      c++;
    }
    rgbSeries.push([r / c, g / c, b / c]);

    // 目の開き指標（上側と下側の明るさ差）
    const eyeH = Math.floor(h * 0.25);
    const topImg = ctx.getImageData(sx, Math.max(0, sy - eyeH), size, eyeH).data;
    const bottomImg = ctx.getImageData(sx, sy, size, eyeH).data;

    let tSum = 0, bSum = 0, tC = 0, bC = 0;
    for (let i = 0; i < topImg.length; i += 4) {
      tSum += (topImg[i] + topImg[i+1] + topImg[i+2]) / 3;
      tC++;
    }
    for (let i = 0; i < bottomImg.length; i += 4) {
      bSum += (bottomImg[i] + bottomImg[i+1] + bottomImg[i+2]) / 3;
      bC++;
    }

    const topMean = tSum / tC;
    const bottomMean = bSum / bC;
    const eyeOpen = bottomMean - topMean; // 目が細いと差が小さくなる

    eyeSeries.push(eyeOpen);
  }

  function mean(arr) { return arr.reduce((a,b)=>a+b,0)/arr.length; }
  function std(arr) {
    const m = mean(arr);
    return Math.sqrt(arr.reduce((s,x)=>s+(x-m)*(x-m),0)/arr.length);
  }

  function detrendAndSmooth(sig, win=5) {
    const n = sig.length;
    const m = mean(sig);
    const x = sig.map(v=>v-m);
    const y = [];
    for (let i=0;i<n;i++){
      let s=0,c=0;
      for (let k=-win;k<=win;k++){
        const j=i+k;
        if(j>=0 && j<n){ s+=x[j]; c++; }
      }
      y.push(s/c);
    }
    return y;
  }

  function pos(rgbSeries) {
    const n = rgbSeries.length;
    const r = rgbSeries.map(v=>v[0]);
    const g = rgbSeries.map(v=>v[1]);
    const b = rgbSeries.map(v=>v[2]);

    const mr=mean(r), mg=mean(g), mb=mean(b);
    const X=[], Y=[];
    for(let i=0;i<n;i++){
      const nr=r[i]/mr, ng=g[i]/mg, nb=b[i]/mb;
      X.push(ng-nb);
      Y.push(-2*nr+ng+nb);
    }
    const alpha = std(Y)!==0 ? std(X)/std(Y) : 0;
    const s = X.map((v,i)=>v+alpha*Y[i]);
    return detrendAndSmooth(s,3);
  }

  function fftHR(signal,fps){
    const n=signal.length;
    const re=new Array(n).fill(0);
    const im=new Array(n).fill(0);

    for(let k=0;k<n;k++){
      let sr=0, si=0;
      for(let t=0;t<n;t++){
        const ang=-2*Math.PI*k*t/n;
        sr+=signal[t]*Math.cos(ang);
        si+=signal[t]*Math.sin(ang);
      }
      re[k]=sr; im[k]=si;
    }

    const mag=[];
    for(let k=0;k<n/2;k++){
      mag.push(Math.sqrt(re[k]*re[k]+im[k]*im[k]));
    }

    const df=fps/n;
    const minHz=0.7, maxHz=4.0;
    const minIndex=Math.max(1,Math.floor(minHz/df));
    const maxIndex=Math.min(mag.length-1,Math.floor(maxHz/df));

    let maxVal=-1, maxIdx=minIndex, sum=0;
    for(let k=minIndex;k<=maxIndex;k++){
      const v=mag[k];
      if(v>maxVal){ maxVal=v; maxIdx=k; }
      sum+=v;
    }

    const hr=(maxIdx*df)*60;
    const noise=sum/(maxIndex-minIndex+1);
    const snr=10*Math.log10((maxVal+1e-6)/(noise+1e-6));
    return {hr,snr};
  }

  function estimateHRV(signal,fps){
    const peaks=[];
    for(let i=1;i<signal.length-1;i++){
      if(signal[i]>signal[i-1] && signal[i]>signal[i+1]) peaks.push(i);
    }
    if(peaks.length<3) return null;

    const rr=[];
    for(let i=0;i<peaks.length-1;i++){
      rr.push((peaks[i+1]-peaks[i])/fps);
    }
    if(rr.length<2) return null;

    const diff2=[];
    for(let i=0;i<rr.length-1;i++){
      diff2.push((rr[i+1]-rr[i])**2);
    }
    return Math.sqrt(mean(diff2))*1000;
  }

  function fatigueScore(hr,snr,rmssd,eyeOpen){
    const hrNorm=Math.max(0,Math.min(1,(hr-50)/50));
    const snrNorm=Math.max(0,Math.min(1,snr/10));
    const rmssdNorm=rmssd?Math.max(0,Math.min(1,rmssd/80)):0.5;

    // 目の開き（差分）を 0〜1 に正規化
    const eyeNorm=Math.max(0,Math.min(1,(eyeOpen-5)/40)); // だいたい 5〜45 を想定
    const eyeFatigue=1-eyeNorm;

    const fatigue=
      hrNorm*0.2 +
      (1-snrNorm)*0.2 +
      (1-rmssdNorm)*0.3 +
      eyeFatigue*0.3;

    const score=Math.round((1-fatigue)*100);
    return Math.max(0,Math.min(100,score));
  }

  function fatigueLevel(score){
    if(score>=80) return "レベル1：元気";
    if(score>=60) return "レベル2：軽度の疲労";
    if(score>=40) return "レベル3：中程度の疲労";
    if(score>=20) return "レベル4：強い疲労";
    return "レベル5：危険（休息推奨）";
  }

  async function startMeasurement(){
    if(running) return;
    running=true;
    rgbSeries=[];
    eyeSeries=[];
    fatigueEl.textContent="--";
    levelEl.textContent="疲労レベル：--";
    logResults("");
    logStatus("カメラ起動中… 顔を中央に合わせてください。");
    startBtn.disabled=true;

    try{
      await initCamera();
    }catch(e){
      logStatus("カメラが使えません（設定で Safari のカメラ許可を確認）。");
      running=false;
      startBtn.disabled=false;
      return;
    }

    logStatus("測定中… 30秒間、できるだけ動かないでください。");
    progressBar.style.display="block";
    progressFill.style.width="0%";

    const interval=setInterval(captureFrame,1000/FPS);

    let elapsed=0;
    const progressTimer=setInterval(()=>{
      elapsed++;
      const ratio=elapsed/(DURATION_SEC*FPS);
      progressFill.style.width=(ratio*100)+"%";
    },1000/FPS);

    setTimeout(()=>{
      running=false;
      clearInterval(interval);
      clearInterval(progressTimer);
      progressBar.style.display="none";

      logStatus("解析中…");

      if(rgbSeries.length<FPS*10){
        logStatus("データ不足（10秒未満）。もう一度測定してください。");
        startBtn.disabled=false;
        return;
      }

      const sig=pos(rgbSeries);
      const {hr,snr}=fftHR(sig,FPS);
      const rmssd=estimateHRV(sig,FPS);
      const eyeOpen=eyeSeries.length?mean(eyeSeries):null;

      const score=fatigueScore(hr,snr,rmssd,eyeOpen);
      const level=fatigueLevel(score);

      fatigueEl.textContent=score;
      levelEl.textContent=`疲労レベル：${level}`;

      let txt="";
      txt+=`推定HR: ${hr.toFixed(1)} bpm\n`;
      txt+=`SNR: ${snr.toFixed(1)} dB\n`;
      if(rmssd) txt+=`簡易HRV(RMSSD): ${rmssd.toFixed(1)} ms\n`;
      else txt+=`簡易HRV(RMSSD): 推定不可（ピーク不足）\n`;
      if(eyeOpen!=null) txt+=`目の開き指標: ${eyeOpen.toFixed(1)}（小さいほど眠気）\n`;
      txt+=`※参考値（医療用途では使用不可）`;
      logResults(txt);

      logStatus("測定完了。もう一度測る場合は「測定開始」を押してください。");
      startBtn.disabled=false;
    },DURATION_SEC*1000);
  }

  startBtn.addEventListener('click',()=>{
    if(!running) startMeasurement();
  });

  if('serviceWorker' in navigator){
    window.addEventListener('load',()=>{
      navigator.serviceWorker.register('service-worker.js').catch(()=>{});
    });
  }
</script>
</body>
</html>
</body>
</html>
